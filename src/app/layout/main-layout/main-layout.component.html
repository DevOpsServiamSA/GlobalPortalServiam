<div class="flex h-screen bg-theme-bg dark:bg-serviam-dark-bg">
    <!-- Desktop Side Navigation -->
    <app-side-nav class="hidden md:block"></app-side-nav>

    <!-- Mobile Side Navigation Overlay -->
    <div 
        *ngIf="isMobileSidenavOpen" 
        class="fixed inset-0 z-50 md:hidden"
        (click)="closeMobileSidenav()"
    >
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black bg-opacity-50 dark:bg-black dark:bg-opacity-70"></div>
        
        <!-- Side Navigation -->
        <div class="relative w-64 h-full">
            <app-side-nav 
                (click)="$event.stopPropagation()"
                (navigationClick)="closeMobileSidenav()">
            </app-side-nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        <!-- TopNav -->
        <app-top-nav (toggleSidenav)="onToggleSidenav()"></app-top-nav>

        <!-- Router Outlet -->
        <main class="flex-1 overflow-y-auto p-6 bg-theme-bg dark:bg-serviam-dark-bg text-theme-primary dark:text-serviam-dark-text">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
