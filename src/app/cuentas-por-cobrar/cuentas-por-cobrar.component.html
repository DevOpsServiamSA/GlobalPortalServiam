<div class="cuentas-por-cobrar-container p-6">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Cuentas por Cobrar</h1>
    <p class="text-gray-600">Gestión de deudas y pagos por empresa</p>
  </div>

  <!-- Company Selector -->
  <div class="mb-6 bg-white p-4 rounded-lg shadow-sm sticky top-0 z-10">
    <app-selector-empresa></app-selector-empresa>
  </div>

  <!-- Tabs de navegación -->
  <nav mat-tab-nav-bar *ngIf="empresaSeleccionada" [tabPanel]="tabPanel" class="mb-4 bg-white rounded-lg shadow-sm">
    <a *ngFor="let link of navLinks"
       mat-tab-link
       [routerLink]="link.route"
       routerLinkActive
       #rla="routerLinkActive"
       [active]="rla.isActive">
      <mat-icon class="mr-2">{{ link.icon }}</mat-icon>
      {{ link.label }}
    </a>
  </nav>
  <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>

  <!-- Router Outlet for Child Views -->
  <div class="view-container">
    <router-outlet></router-outlet>
  </div>
</div>
